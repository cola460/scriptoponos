<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriptoponos — Shared Scripts</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #e6edf3;
        }
        .container { max-width: 950px; margin: 0 auto; }
        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: #8b949e;
            margin-bottom: 20px;
            font-size: 1.1rem;
            border-left: 3px solid #58a6ff;
            padding-left: 15px;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .btn-add {
            background: #238636;
            color: white;
            border: 1px solid #2ea043;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-add:hover { background: #2ea043; }
        .search-box {
            width: 100%;
            padding: 14px 18px;
            background: #0d1117;
            border: 1.5px solid #30363d;
            border-radius: 12px;
            color: #e6edf3;
            font-size: 1rem;
            margin-bottom: 25px;
            transition: border 0.2s, box-shadow 0.2s;
        }
        .search-box:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }
        .search-box::placeholder { color: #6e7681; }
        .script-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        .script-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .script-card:hover {
            border-color: #58a6ff;
            background: #1c2128;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .script-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }
        .script-name {
            font-size: 1.2rem;
            font-weight: 600;
            word-break: break-word;
            color: #e6edf3;
        }
        .script-date {
            font-size: 0.75rem;
            color: #6e7681;
            white-space: nowrap;
            background: #21262d;
            padding: 4px 8px;
            border-radius: 20px;
        }
        .script-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }
        .btn {
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            border: none;
            flex: 1;
        }
        .btn-primary {
            background: #238636;
            color: white;
            border: 1px solid #2ea043;
        }
        .btn-primary:hover { background: #2ea043; }
        .btn-secondary {
            background: #21262d;
            color: #e6edf3;
            border: 1px solid #30363d;
        }
        .btn-secondary:hover { background: #30363d; }
        .btn-danger {
            background: #da3633;
            color: white;
            border: 1px solid #f85149;
        }
        .btn-danger:hover { background: #c92c2a; }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: modalIn 0.2s ease;
        }
        .modal-large { max-width: 900px; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 1px solid #30363d;
        }
        .modal-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #e6edf3;
        }
        .modal-close {
            background: none;
            border: none;
            color: #8b949e;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 6px;
            transition: all 0.15s;
        }
        .modal-close:hover { background: #21262d; color: #f85149; }
        .modal-body {
            padding: 25px;
            overflow-y: auto;
        }
        .modal-body pre {
            margin: 0;
            border-radius: 10px;
            font-size: 14px;
        }
        .modal-footer {
            padding: 15px 25px;
            border-top: 1px solid #30363d;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #e6edf3;
            font-weight: 500;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1.5px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-size: 1rem;
        }
        .form-input:focus {
            outline: none;
            border-color: #58a6ff;
        }
        .form-textarea {
            min-height: 300px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            resize: vertical;
        }
        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }
        .empty-message {
            text-align: center;
            padding: 50px;
            color: #8b949e;
            font-size: 1.2rem;
        }
        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #238636;
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 500;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 2000;
        }
        .toast.show { opacity: 1; }
        .toast.error { background: #f85149; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-row">
            <h1>scriptoponos</h1>
            <button class="btn-add" id="addScriptBtn">+ Add Script</button>
        </div>
        <div class="subtitle">Shared Script Collection</div>
        
        <input type="text" class="search-box" placeholder="Search scripts..." id="searchInput">
        
        <div class="script-grid" id="scriptContainer"></div>
    </div>
    
    <!-- View Modal -->
    <div class="modal-overlay" id="viewModal">
        <div class="modal modal-large">
            <div class="modal-header">
                <span class="modal-title" id="viewModalTitle"></span>
                <button class="modal-close" data-close="viewModal">&times;</button>
            </div>
            <div class="modal-body" id="viewModalBody"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="copyBtn">Copy</button>
                <button class="btn btn-primary" id="downloadBtn">Download</button>
            </div>
        </div>
    </div>
    
    <!-- Edit/Add Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal modal-large">
            <div class="modal-header">
                <span class="modal-title" id="editModalTitle">Edit Script</span>
                <button class="modal-close" data-close="editModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Name (without .js)</label>
                    <input type="text" class="form-input" id="scriptName" placeholder="Buttons">
                </div>
                <div class="form-group">
                    <label class="form-label">Code</label>
                    <textarea class="form-input form-textarea" id="scriptCode" placeholder="// Your JavaScript code"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" id="deleteBtn" style="display:none;">Delete</button>
                <button class="btn btn-secondary" data-close="editModal">Cancel</button>
                <button class="btn btn-primary" id="saveBtn">Save</button>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    
    <script>
        (function() {
            // КОНФИГУРАЦИЯ - только ngrok URL и Gist ID
            const PROXY_URL = 'https://squeamish-resonate-expel.ngrok-free.dev';
            const GIST_ID = '3fc3850ddd0b8962d24b87912482e370';
            
            const API_URL = `${PROXY_URL}/gist/${GIST_ID}`;
            const RAW_URL = `${PROXY_URL}/raw/${GIST_ID}`;
            
            const container = document.getElementById('scriptContainer');
            const searchInput = document.getElementById('searchInput');
            const toast = document.getElementById('toast');
            
            const viewModal = document.getElementById('viewModal');
            const viewModalTitle = document.getElementById('viewModalTitle');
            const viewModalBody = document.getElementById('viewModalBody');
            
            const editModal = document.getElementById('editModal');
            const editModalTitle = document.getElementById('editModalTitle');
            const scriptName = document.getElementById('scriptName');
            const scriptCode = document.getElementById('scriptCode');
            const deleteBtn = document.getElementById('deleteBtn');
            
            let allScripts = [];
            let editingFilename = null;
            
            function showToast(message, isError = false) {
                toast.textContent = message;
                toast.classList.add('show');
                if (isError) toast.classList.add('error');
                setTimeout(() => {
                    toast.classList.remove('show');
                    toast.classList.remove('error');
                }, 3000);
            }
            
            function formatDate(dateString) {
                if (!dateString) return 'N/A';
                const date = new Date(dateString);
                const now = new Date();
                const diffMs = now - date;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMs / 3600000);
                const diffDays = Math.floor(diffMs / 86400000);
                
                if (diffMins < 1) return 'Just now';
                if (diffMins < 60) return `${diffMins}m ago`;
                if (diffHours < 24) return `${diffHours}h ago`;
                if (diffDays < 7) return `${diffDays}d ago`;
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }
            
            async function fetchScripts() {
                try {
                    const response = await fetch(RAW_URL + '?t=' + Date.now(), {
                        headers: { 'ngrok-skip-browser-warning': 'true' }
                    });
                    if (!response.ok) throw new Error('Failed to fetch');
                    const text = await response.text();
                    return JSON.parse(text || '[]');
                } catch (e) {
                    console.error('Fetch error:', e);
                    return [];
                }
            }
            
            async function saveToGist(scripts) {
                try {
                    const response = await fetch(API_URL, {
                        method: 'PATCH',
                        headers: {
                            'Content-Type': 'application/json',
                            'ngrok-skip-browser-warning': 'true'
                        },
                        body: JSON.stringify({
                            files: {
                                'scripts.json': {
                                    content: JSON.stringify(scripts, null, 2)
                                }
                            }
                        })
                    });
                    
                    if (!response.ok) throw new Error('Failed to save');
                    return true;
                } catch (e) {
                    console.error('Save error:', e);
                    showToast('Failed to save changes', true);
                    return false;
                }
            }
            
            async function renderScripts(filterText = '') {
                allScripts = await fetchScripts();
                const filtered = allScripts.filter(s => 
                    s.name.toLowerCase().includes(filterText.toLowerCase())
                );
                
                if (filtered.length === 0) {
                    container.innerHTML = `<div class="empty-message">No scripts found<br><span style="font-size:0.9rem;">Click "Add Script" to create one</span></div>`;
                    return;
                }
                
                container.innerHTML = filtered.map(script => `
                    <div class="script-card">
                        <div class="script-header">
                            <span class="script-name">${script.name}</span>
                            <span class="script-date" title="Last updated">${formatDate(script.updatedAt)}</span>
                        </div>
                        <div class="script-actions">
                            <button class="btn btn-primary" data-download="${script.filename}">Download</button>
                            <button class="btn btn-secondary" data-view="${script.filename}">View</button>
                            <button class="btn btn-secondary" data-edit="${script.filename}">Edit</button>
                        </div>
                    </div>
                `).join('');
                
                document.querySelectorAll('[data-download]').forEach(btn => {
                    btn.addEventListener('click', () => downloadScript(btn.dataset.download));
                });
                document.querySelectorAll('[data-view]').forEach(btn => {
                    btn.addEventListener('click', () => viewScript(btn.dataset.view));
                });
                document.querySelectorAll('[data-edit]').forEach(btn => {
                    btn.addEventListener('click', () => editScript(btn.dataset.edit));
                });
            }
            
            function downloadScript(filename) {
                const script = allScripts.find(s => s.filename === filename);
                if (!script) return;
                
                const blob = new Blob([script.code], { type: 'application/javascript' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
            }
            
            function viewScript(filename) {
                const script = allScripts.find(s => s.filename === filename);
                if (!script) return;
                
                viewModalTitle.textContent = filename;
                viewModalBody.innerHTML = `<pre><code class="language-javascript">${escapeHtml(script.code)}</code></pre>`;
                Prism.highlightAllUnder(viewModalBody);
                viewModal.classList.add('active');
                
                document.getElementById('copyBtn').onclick = async () => {
                    await navigator.clipboard.writeText(script.code);
                    showToast('Copied to clipboard');
                };
                
                document.getElementById('downloadBtn').onclick = () => {
                    downloadScript(filename);
                    viewModal.classList.remove('active');
                };
            }
            
            function editScript(filename) {
                const script = allScripts.find(s => s.filename === filename);
                if (!script) return;
                
                editingFilename = filename;
                editModalTitle.textContent = `Edit ${filename}`;
                scriptName.value = script.name;
                scriptCode.value = script.code;
                deleteBtn.style.display = 'block';
                editModal.classList.add('active');
            }
            
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            document.getElementById('addScriptBtn').addEventListener('click', () => {
                editingFilename = null;
                editModalTitle.textContent = 'Add New Script';
                scriptName.value = '';
                scriptCode.value = '';
                deleteBtn.style.display = 'none';
                editModal.classList.add('active');
            });
            
            document.getElementById('saveBtn').addEventListener('click', async () => {
                const name = scriptName.value.trim();
                const code = scriptCode.value;
                
                if (!name) {
                    showToast('Name is required', true);
                    return;
                }
                
                const filename = name + '.js';
                const now = new Date().toISOString();
                
                if (editingFilename) {
                    const index = allScripts.findIndex(s => s.filename === editingFilename);
                    if (index !== -1) {
                        allScripts[index].name = name;
                        allScripts[index].filename = filename;
                        allScripts[index].code = code;
                        allScripts[index].updatedAt = now;
                    }
                } else {
                    if (allScripts.some(s => s.filename === filename)) {
                        showToast('Script with this name already exists', true);
                        return;
                    }
                    
                    allScripts.push({ name, filename, code, updatedAt: now });
                }
                
                const saved = await saveToGist(allScripts);
                if (saved) {
                    editModal.classList.remove('active');
                    renderScripts(searchInput.value);
                    showToast(editingFilename ? 'Script updated!' : 'Script added!');
                }
            });
            
            deleteBtn.addEventListener('click', async () => {
                if (!editingFilename || !confirm('Delete this script?')) return;
                
                allScripts = allScripts.filter(s => s.filename !== editingFilename);
                const saved = await saveToGist(allScripts);
                
                if (saved) {
                    editModal.classList.remove('active');
                    renderScripts(searchInput.value);
                    showToast('Script deleted');
                }
            });
            
            document.querySelectorAll('[data-close]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.getElementById(btn.dataset.close).classList.remove('active');
                });
            });
            
            document.querySelectorAll('.modal-overlay').forEach(modal => {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) modal.classList.remove('active');
                });
            });
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
                }
            });
            
            searchInput.addEventListener('input', (e) => renderScripts(e.target.value));
            
            renderScripts();
        })();
    </script>
</body>
</html>
