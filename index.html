<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriptoponos — Shared Scripts</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #e6edf3;
        }
        .container { max-width: 950px; margin: 0 auto; }
        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: #8b949e;
            margin-bottom: 30px;
            font-size: 1.1rem;
            border-left: 3px solid #58a6ff;
            padding-left: 15px;
        }
        .search-box {
            width: 100%;
            padding: 14px 18px;
            background: #0d1117;
            border: 1.5px solid #30363d;
            border-radius: 12px;
            color: #e6edf3;
            font-size: 1rem;
            margin-bottom: 25px;
            transition: border 0.2s, box-shadow 0.2s;
        }
        .search-box:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }
        .search-box::placeholder { color: #6e7681; }
        .script-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        .script-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .script-card:hover {
            border-color: #58a6ff;
            background: #1c2128;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .script-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }
        .script-name {
            font-size: 1.2rem;
            font-weight: 600;
            word-break: break-word;
            color: #e6edf3;
        }
        .script-date {
            font-size: 0.75rem;
            color: #6e7681;
            white-space: nowrap;
            background: #21262d;
            padding: 4px 8px;
            border-radius: 20px;
        }
        .script-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }
        .btn {
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            border: none;
            flex: 1;
        }
        .btn-primary {
            background: #238636;
            color: white;
            border: 1px solid #2ea043;
        }
        .btn-primary:hover { background: #2ea043; }
        .btn-secondary {
            background: #21262d;
            color: #e6edf3;
            border: 1px solid #30363d;
        }
        .btn-secondary:hover { background: #30363d; }
        .btn-warning {
            background: #9a6700;
            color: white;
            border: 1px solid #d29922;
        }
        .btn-warning:hover { background: #b88700; }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            max-width: 900px;
            width: 100%;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: modalIn 0.2s ease;
        }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 1px solid #30363d;
        }
        .modal-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #e6edf3;
        }
        .modal-close {
            background: none;
            border: none;
            color: #8b949e;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 6px;
            transition: all 0.15s;
        }
        .modal-close:hover { background: #21262d; color: #f85149; }
        .modal-body {
            padding: 25px;
            overflow-y: auto;
        }
        .modal-body pre {
            margin: 0;
            border-radius: 10px;
            font-size: 14px;
        }
        .modal-footer {
            padding: 15px 25px;
            border-top: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }
        .modal-footer-left { display: flex; gap: 8px; }
        .modal-footer-right { display: flex; gap: 8px; }
        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }
        .empty-message {
            text-align: center;
            padding: 50px;
            color: #8b949e;
            font-size: 1.2rem;
        }
        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #238636;
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 500;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 2000;
        }
        .toast.show { opacity: 1; }
        .toast.error { background: #f85149; }
    </style>
</head>
<body>
    <div class="container">
        <h1>scriptoponos</h1>
        <div class="subtitle">Shared Script Collection</div>
        
        <input type="text" class="search-box" placeholder="Search scripts..." id="searchInput">
        
        <div class="script-grid" id="scriptContainer"></div>
    </div>
    
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">script.js</span>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <div class="loading-spinner">Loading code...</div>
            </div>
            <div class="modal-footer">
                <div class="modal-footer-left">
                    <button class="btn btn-warning" id="modalReplaceBtn">Edit in Opengist</button>
                </div>
                <div class="modal-footer-right">
                    <button class="btn btn-secondary" id="modalCopyBtn">Copy</button>
                    <button class="btn btn-primary" id="modalDownloadBtn">Download</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    
    <script>
        (function() {
            const API_BASE = 'https://squeamish-resonate-expel.ngrok-free.dev';
            const USERNAME = 'cola';
            const SNIPPET_ID = '666a44dc160f444988c4484f49abbe70';
            
            const container = document.getElementById('scriptContainer');
            const searchInput = document.getElementById('searchInput');
            const toast = document.getElementById('toast');
            
            const modal = document.getElementById('modal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            const modalClose = document.getElementById('modalClose');
            const modalCopyBtn = document.getElementById('modalCopyBtn');
            const modalDownloadBtn = document.getElementById('modalDownloadBtn');
            const modalReplaceBtn = document.getElementById('modalReplaceBtn');
            
            let currentScript = { name: '', filename: '', code: '' };
            let allScripts = [];
            
            function showToast(message, isError = false) {
                toast.textContent = message;
                toast.classList.add('show');
                if (isError) toast.classList.add('error');
                setTimeout(() => {
                    toast.classList.remove('show');
                    toast.classList.remove('error');
                }, 3000);
            }
            
            function formatDate(dateString) {
                if (!dateString) return 'N/A';
                const date = new Date(dateString);
                const now = new Date();
                const diffMs = now - date;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMs / 3600000);
                const diffDays = Math.floor(diffMs / 86400000);
                
                if (diffMins < 1) return 'Just now';
                if (diffMins < 60) return `${diffMins}m ago`;
                if (diffHours < 24) return `${diffHours}h ago`;
                if (diffDays < 7) return `${diffDays}d ago`;
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }
            
            async function fetchScripts() {
                try {
                    const response = await fetch(`${API_BASE}/${USERNAME}/${SNIPPET_ID}/raw`, {
                        headers: {
                            'ngrok-skip-browser-warning': 'true'
                        }
                    });
                    
                    if (!response.ok) throw new Error('Failed to fetch');
                    const text = await response.text();
                    return JSON.parse(text || '[]');
                } catch (e) {
                    console.error('Fetch error:', e);
                    showToast('Failed to load scripts', true);
                    return [];
                }
            }
            
            async function renderScripts(filterText = '') {
                allScripts = await fetchScripts();
                const filtered = allScripts.filter(s => 
                    s.name.toLowerCase().includes(filterText.toLowerCase())
                );
                
                if (filtered.length === 0) {
                    container.innerHTML = `<div class="empty-message">Nothing found<br><span style="font-size:0.9rem;">Add scripts in Opengist</span></div>`;
                    return;
                }
                
                container.innerHTML = filtered.map(script => `
                    <div class="script-card">
                        <div class="script-header">
                            <span class="script-name">${script.name}</span>
                            <span class="script-date" title="Last updated">${formatDate(script.updatedAt)}</span>
                        </div>
                        <div class="script-actions">
                            <button class="btn btn-primary" data-download="${script.filename}">Download</button>
                            <button class="btn btn-secondary" data-view="${script.filename}">View</button>
                        </div>
                    </div>
                `).join('');
                
                document.querySelectorAll('[data-download]').forEach(btn => {
                    btn.addEventListener('click', () => downloadScript(btn.dataset.download));
                });
                document.querySelectorAll('[data-view]').forEach(btn => {
                    btn.addEventListener('click', () => viewScript(btn.dataset.view));
                });
            }
            
            function downloadScript(filename) {
                const script = allScripts.find(s => s.filename === filename);
                if (!script) return;
                
                const blob = new Blob([script.code], { type: 'application/javascript' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
            }
            
            function viewScript(filename) {
                const script = allScripts.find(s => s.filename === filename);
                if (!script) return;
                
                currentScript = script;
                modalTitle.textContent = filename;
                modalBody.innerHTML = `<pre><code class="language-javascript">${escapeHtml(script.code)}</code></pre>`;
                Prism.highlightAllUnder(modalBody);
                modal.classList.add('active');
            }
            
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            modalReplaceBtn.addEventListener('click', () => {
                window.open(`${API_BASE}/${USERNAME}/${SNIPPET_ID}/edit`, '_blank');
                showToast('Opened Opengist editor in new tab');
            });
            
            modalCopyBtn.addEventListener('click', async () => {
                const codeBlock = modalBody.querySelector('code');
                if (codeBlock) {
                    await navigator.clipboard.writeText(codeBlock.textContent);
                    modalCopyBtn.textContent = 'Copied!';
                    setTimeout(() => modalCopyBtn.textContent = 'Copy', 1500);
                    showToast('Copied to clipboard');
                }
            });
            
            modalDownloadBtn.addEventListener('click', () => {
                if (currentScript.filename) {
                    downloadScript(currentScript.filename);
                    modal.classList.remove('active');
                }
            });
            
            modalClose.addEventListener('click', () => modal.classList.remove('active'));
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.classList.remove('active');
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('active')) {
                    modal.classList.remove('active');
                }
            });
            
            searchInput.addEventListener('input', (e) => renderScripts(e.target.value));
            
            renderScripts();
        })();
    </script>
</body>
</html>
