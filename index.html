<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriptoponos — Коллекция скриптов</title>
    <!-- Prism.js для подсветки синтаксиса -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #e6edf3;
        }
        .container { max-width: 900px; margin: 0 auto; }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #8b949e;
            margin-bottom: 30px;
            font-size: 1.1rem;
            border-left: 3px solid #58a6ff;
            padding-left: 15px;
        }
        
        .stats {
            background: #21262d;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 25px;
            display: flex;
            gap: 25px;
            border: 1px solid #30363d;
            font-size: 0.95rem;
        }
        
        .stat-item { display: flex; align-items: center; gap: 8px; color: #8b949e; }
        .stat-number {
            background: #30363d;
            padding: 3px 10px;
            border-radius: 20px;
            color: #e6edf3;
            font-weight: 600;
        }
        
        .search-box {
            width: 100%;
            padding: 14px 18px;
            background: #0d1117;
            border: 1.5px solid #30363d;
            border-radius: 12px;
            color: #e6edf3;
            font-size: 1rem;
            margin-bottom: 25px;
            transition: border 0.2s, box-shadow 0.2s;
        }
        .search-box:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }
        .search-box::placeholder { color: #6e7681; }
        
        .script-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        
        .script-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .script-card:hover {
            border-color: #58a6ff;
            background: #1c2128;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        
        .script-name {
            font-size: 1.2rem;
            font-weight: 600;
            word-break: break-all;
            color: #e6edf3;
        }
        
        .script-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }
        
        .btn {
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            border: none;
            flex: 1;
        }
        
        .btn-primary {
            background: #238636;
            color: white;
            border: 1px solid #2ea043;
        }
        .btn-primary:hover { background: #2ea043; }
        
        .btn-secondary {
            background: #21262d;
            color: #e6edf3;
            border: 1px solid #30363d;
        }
        .btn-secondary:hover { background: #30363d; }
        
        /* Модальное окно */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        
        .modal {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            max-width: 900px;
            width: 100%;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: modalIn 0.2s ease;
        }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 1px solid #30363d;
        }
        .modal-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #e6edf3;
        }
        .modal-close {
            background: none;
            border: none;
            color: #8b949e;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 6px;
            transition: all 0.15s;
        }
        .modal-close:hover { background: #21262d; color: #f85149; }
        
        .modal-body {
            padding: 25px;
            overflow-y: auto;
        }
        .modal-body pre {
            margin: 0;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .modal-footer {
            padding: 15px 25px;
            border-top: 1px solid #30363d;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        
        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }
        
        .footer {
            margin-top: 45px;
            text-align: center;
            color: #6e7681;
            font-size: 0.85rem;
            border-top: 1px solid #21262d;
            padding-top: 25px;
        }
        
        .empty-message {
            text-align: center;
            padding: 50px;
            color: #8b949e;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>scriptoponos</h1>
        <div class="subtitle">Коллекция полезных скриптов</div>
        
        <div class="stats">
            <div class="stat-item">Всего скриптов: <span class="stat-number" id="totalCount">0</span></div>
            <div class="stat-item">Найдено: <span class="stat-number" id="filteredCount">0</span></div>
        </div>
        
        <input type="text" class="search-box" placeholder="Поиск по названию скрипта..." id="searchInput">
        
        <div class="script-grid" id="scriptContainer"></div>
        
        <div class="footer">
            <a href="https://github.com/cola460/scriptoponos" target="_blank" style="color: #58a6ff; text-decoration: none;">Звездочка на GitHub</a> • Добавляйте новые .js файлы в репозиторий
        </div>
    </div>
    
    <!-- Модальное окно для просмотра кода -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">script.js</span>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <div class="loading-spinner">Загрузка кода...</div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modalCopyBtn">Копировать</button>
                <a href="#" class="btn btn-primary" id="modalDownloadBtn" download>Скачать</a>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    
    <script>
        (function() {
            // Список всех JS-файлов
            const scriptFiles = [
                "Buttons.js",
                "Click.js",
                "Counter.js",
                "Jira.js",
                "Junk.js",
                "Previous Convos.js",
                "Rewrite.js",
                "Timers.js",
                "VIP check.js",
                "Withdrawals.js"
            ];
            
            const container = document.getElementById('scriptContainer');
            const searchInput = document.getElementById('searchInput');
            const totalSpan = document.getElementById('totalCount');
            const filteredSpan = document.getElementById('filteredCount');
            
            // Модальное окно
            const modal = document.getElementById('modal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            const modalClose = document.getElementById('modalClose');
            const modalCopyBtn = document.getElementById('modalCopyBtn');
            const modalDownloadBtn = document.getElementById('modalDownloadBtn');
            
            let currentScript = { name: '', rawUrl: '', url: '' };
            
            const allScripts = scriptFiles.map(filename => ({
                name: filename,
                url: filename,
                rawUrl: `https://raw.githubusercontent.com/cola460/scriptoponos/main/${encodeURIComponent(filename)}`
            }));
            
            function renderScripts(filterText = '') {
                const filtered = allScripts.filter(s => 
                    s.name.toLowerCase().includes(filterText.toLowerCase())
                );
                
                totalSpan.textContent = allScripts.length;
                filteredSpan.textContent = filtered.length;
                
                if (filtered.length === 0) {
                    container.innerHTML = `<div class="empty-message">Ничего не найдено<br><span style="font-size:0.9rem;">Попробуйте изменить запрос</span></div>`;
                    return;
                }
                
                container.innerHTML = filtered.map(script => `
                    <div class="script-card">
                        <div class="script-name">${script.name}</div>
                        <div class="script-actions">
                            <a href="${script.url}" download class="btn btn-primary">Скачать</a>
                            <button class="btn btn-secondary" onclick="viewScript('${script.name}', '${script.rawUrl}', '${script.url}')">Смотреть</button>
                        </div>
                    </div>
                `).join('');
            }
            
            window.viewScript = async function(name, rawUrl, url) {
                currentScript = { name, rawUrl, url };
                modalTitle.textContent = name;
                modalBody.innerHTML = '<div class="loading-spinner">Загрузка кода...</div>';
                modal.classList.add('active');
                modalDownloadBtn.href = url;
                
                try {
                    const response = await fetch(rawUrl);
                    if (!response.ok) throw new Error('Не удалось загрузить');
                    const code = await response.text();
                    
                    modalBody.innerHTML = `<pre><code class="language-javascript">${escapeHtml(code)}</code></pre>`;
                    Prism.highlightAllUnder(modalBody);
                } catch (error) {
                    modalBody.innerHTML = `<div class="empty-message" style="padding:20px;">Ошибка загрузки: ${error.message}</div>`;
                }
            };
            
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            // Копирование кода
            modalCopyBtn.addEventListener('click', async () => {
                const codeBlock = modalBody.querySelector('code');
                if (codeBlock) {
                    const text = codeBlock.textContent;
                    await navigator.clipboard.writeText(text);
                    modalCopyBtn.textContent = 'Скопировано!';
                    setTimeout(() => modalCopyBtn.textContent = 'Копировать', 1500);
                }
            });
            
            // Закрытие модалки
            modalClose.addEventListener('click', () => modal.classList.remove('active'));
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.classList.remove('active');
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('active')) {
                    modal.classList.remove('active');
                }
            });
            
            searchInput.addEventListener('input', (e) => renderScripts(e.target.value));
            
            renderScripts();
        })();
    </script>
</body>
</html>
