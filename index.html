<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriptoponos — Коллекция скриптов</title>
    <style>
        * { box-sizing: border-box; margin: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #e6edf3;
        }
        .container { max-width: 900px; margin: 0 auto; }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #8b949e;
            margin-bottom: 30px;
            font-size: 1.1rem;
            border-left: 3px solid #58a6ff;
            padding-left: 15px;
        }
        
        .stats {
            background: #21262d;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 25px;
            display: flex;
            gap: 25px;
            border: 1px solid #30363d;
            font-size: 0.95rem;
        }
        
        .stat-item { display: flex; align-items: center; gap: 8px; color: #8b949e; }
        .stat-number {
            background: #30363d;
            padding: 3px 10px;
            border-radius: 20px;
            color: #e6edf3;
            font-weight: 600;
        }
        
        .search-box {
            width: 100%;
            padding: 14px 18px;
            background: #0d1117;
            border: 1.5px solid #30363d;
            border-radius: 12px;
            color: #e6edf3;
            font-size: 1rem;
            margin-bottom: 25px;
            transition: border 0.2s, box-shadow 0.2s;
        }
        .search-box:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }
        .search-box::placeholder { color: #6e7681; }
        
        .script-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        
        .script-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .script-card:hover {
            border-color: #58a6ff;
            background: #1c2128;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        
        .script-name {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            word-break: break-all;
        }
        .script-name .js-icon { color: #f7df1e; font-size: 1.3rem; }
        
        .script-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }
        
        .btn {
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.15s;
            border: none;
            flex: 1;
        }
        
        .btn-primary {
            background: #238636;
            color: white;
            border: 1px solid #2ea043;
        }
        .btn-primary:hover { background: #2ea043; }
        
        .btn-secondary {
            background: #21262d;
            color: #e6edf3;
            border: 1px solid #30363d;
        }
        .btn-secondary:hover { background: #30363d; }
        
        .btn-copy {
            background: #1f2a3f;
            color: #58a6ff;
            border: 1px solid #30363d;
            padding: 10px 12px;
            flex: 0.5;
        }
        .btn-copy:hover { background: #2d3a4f; }
        
        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #238636;
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 500;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }
        
        .footer {
            margin-top: 45px;
            text-align: center;
            color: #6e7681;
            font-size: 0.85rem;
            border-top: 1px solid #21262d;
            padding-top: 25px;
        }
        
        .empty-message {
            text-align: center;
            padding: 50px;
            color: #8b949e;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📁 scriptoponos</h1>
        <div class="subtitle">Коллекция полезных скриптов</div>
        
        <div class="stats">
            <div class="stat-item">📄 Всего скриптов: <span class="stat-number" id="totalCount">0</span></div>
            <div class="stat-item">🔍 Найдено: <span class="stat-number" id="filteredCount">0</span></div>
        </div>
        
        <input type="text" class="search-box" placeholder="🔎 Поиск по названию скрипта..." id="searchInput">
        
        <div class="script-grid" id="scriptContainer"></div>
        
        <div class="footer">
            <a href="https://github.com/cola460/scriptoponos" target="_blank" style="color: #58a6ff; text-decoration: none;">⭐ Звёздочка на GitHub</a> • Добавляйте новые .js файлы в репозиторий
        </div>
    </div>
    
    <div class="toast" id="toast">📋 Ссылка скопирована!</div>
    
    <script>
        (function() {
            // ====== СПИСОК ВСЕХ ТВОИХ JS-ФАЙЛОВ ======
            // Просто добавь сюда имя файла, если появится новый
            const scriptFiles = [
                "Buttons.js",
                "Click.js",
                "Counter.js",
                "Jira.js",
                "Junk.js",
                "Previous Convos.js",
                "Rewrite.js",
                "Timers.js",
                "VIP check.js",
                "Withdrawals.js"
            ];
            
            const container = document.getElementById('scriptContainer');
            const searchInput = document.getElementById('searchInput');
            const totalSpan = document.getElementById('totalCount');
            const filteredSpan = document.getElementById('filteredCount');
            const toast = document.getElementById('toast');
            
            let allScripts = scriptFiles.map(filename => ({
                name: filename,
                url: filename, // относительный путь работает
                rawUrl: `https://raw.githubusercontent.com/cola460/scriptoponos/main/${encodeURIComponent(filename)}`
            }));
            
            function renderScripts(filterText = '') {
                const filtered = allScripts.filter(s => 
                    s.name.toLowerCase().includes(filterText.toLowerCase())
                );
                
                totalSpan.textContent = allScripts.length;
                filteredSpan.textContent = filtered.length;
                
                if (filtered.length === 0) {
                    container.innerHTML = `<div class="empty-message">😕 Ничего не найдено<br><span style="font-size:0.9rem;">Попробуйте изменить запрос</span></div>`;
                    return;
                }
                
                container.innerHTML = filtered.map(script => `
                    <div class="script-card">
                        <div class="script-name">
                            <span class="js-icon">📄</span>
                            ${script.name}
                        </div>
                        <div class="script-actions">
                            <a href="${script.url}" download class="btn btn-primary">⬇ Скачать</a>
                            <button class="btn btn-secondary" onclick="viewRaw('${script.rawUrl}')">👁 Смотреть</button>
                            <button class="btn btn-copy" onclick="copyRawUrl('${script.rawUrl}', '${script.name}')">📋</button>
                        </div>
                    </div>
                `).join('');
            }
            
            window.viewRaw = function(rawUrl) {
                window.open(rawUrl, '_blank');
            };
            
            window.copyRawUrl = function(rawUrl, name) {
                navigator.clipboard.writeText(rawUrl).then(() => {
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 2000);
                }).catch(() => {
                    alert('Не удалось скопировать ссылку');
                });
            };
            
            searchInput.addEventListener('input', (e) => {
                renderScripts(e.target.value);
            });
            
            // Первый рендер
            renderScripts();
            
            // Если в репозитории появятся новые файлы — просто добавь их в массив scriptFiles выше
        })();
    </script>
</body>
</html>
